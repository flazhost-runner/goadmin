{{define "permissions/form"}}{{template "admin/head" .}}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-800">Permission Management</h1>
</div>

<div class="tw-card p-6">
  <h2 class="text-lg font-bold mb-4" style="color:var(--primary)">Permission Form</h2>
  <form method="post" action="{{.action}}">
    <input type="hidden" name="_csrf" value="{{._csrf}}">
    <div class="mb-3"><label class="form-label fw-semibold">Name</label><input type="text" name="name" required value="{{if .permission}}{{.permission.Name}}{{end}}" placeholder="mis. user.view" class="form-control font-mono"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Guard</label>
      <select name="guard_name" class="form-control">
        <option value="web" {{if .permission}}{{if eq .permission.GuardName "web"}}selected{{end}}{{else}}selected{{end}}>web</option>
        <option value="api" {{if .permission}}{{if eq .permission.GuardName "api"}}selected{{end}}{{end}}>api</option>
      </select>
    </div>
    <div class="mb-3"><label class="form-label fw-semibold">Method</label>
      <input type="text" name="method" value="{{if .permission}}{{.permission.Method}}{{end}}" class="form-control">
    </div>
    <div class="mb-3"><label class="form-label fw-semibold">Status</label>
      <select name="status" class="form-control">
        <option value="Active" {{if .permission}}{{if eq .permission.Status "Active"}}selected{{end}}{{else}}selected{{end}}>Active</option>
        <option value="Inactive" {{if .permission}}{{if eq .permission.Status "Inactive"}}selected{{end}}{{end}}>Inactive</option>
      </select>
    </div>
    <div class="mb-4"><label class="form-label fw-semibold">Description</label><input type="text" name="description" value="{{if .permission}}{{.permission.Description}}{{end}}" class="form-control"></div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary-tw px-4 py-2"><i class="fas fa-save me-1"></i> Save</button>
      <a href="/admin/v1/access/permission" class="btn btn-danger px-4 py-2">Back</a>
    </div>
  </form>
</div>
{{template "admin/foot" .}}{{end}}
