{{define "roles/form"}}{{template "admin/head" .}}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-gray-800">Role Management</h1>
</div>

<div class="tw-card p-6">
  <h2 class="text-lg font-bold mb-4" style="color:var(--primary)">Role Form</h2>
  <form method="post" action="{{.action}}">
    <input type="hidden" name="_csrf" value="{{._csrf}}">
    {{if .role}}
    <div class="mb-3">
      <label for="name" class="form-label fw-semibold">Name</label>
      <input id="name" type="text" name="name" value="{{.role.Name}}" class="form-control">
    </div>
    <div class="mb-3">
      <label for="status" class="form-label fw-semibold">Status</label>
      <select id="status" name="status" class="form-control">
        <option value="Active" {{if eq .role.Status "Active"}}selected{{end}}>Active</option>
        <option value="Inactive" {{if eq .role.Status "Inactive"}}selected{{end}}>Inactive</option>
      </select>
    </div>
    <div class="mb-4">
      <label for="desc" class="form-label fw-semibold">Description</label>
      <input id="desc" type="text" name="desc" value="{{.role.Description}}" class="form-control">
    </div>
    {{else}}
    <div class="mb-3">
      <label for="name" class="form-label fw-semibold">Name</label>
      <input id="name" type="text" name="name" value="" class="form-control">
    </div>
    <div class="mb-3">
      <label for="desc" class="form-label fw-semibold">Description</label>
      <input id="desc" type="text" name="desc" value="" class="form-control">
    </div>
    <div class="mb-4">
      <label for="status" class="form-label fw-semibold">Status</label>
      <select id="status" name="status" class="form-control">
        <option value="Active" selected>Active</option>
        <option value="Inactive">Inactive</option>
      </select>
    </div>
    {{end}}
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary-tw px-4 py-2"><i class="fas fa-save me-1"></i> Save</button>
      <a href="/admin/v1/access/role" class="btn btn-danger px-4 py-2 text-white">Back</a>
    </div>
  </form>
</div>
{{template "admin/foot" .}}{{end}}
