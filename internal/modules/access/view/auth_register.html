{{define "auth/register"}}{{template "auth/head" .}}
<div class="w-full max-w-sm tw-card p-8">
  <div class="mb-6 text-center">
    {{if .setting}}{{if .setting.Logo}}<img class="h-12 mx-auto object-contain mb-3" src="{{.setting.Logo}}">{{end}}{{end}}
    <h1 class="text-xl font-bold" style="color:var(--primary)">Create Account</h1>
    <p class="text-sm text-gray-500">Daftar akun baru.</p>
  </div>
  {{if .flash_error}}<div class="alert alert-danger">{{.flash_error}}</div>{{end}}
  <form method="post" action="/auth/register">
    <input type="hidden" name="_csrf" value="{{._csrf}}">
    <div class="mb-3"><label class="form-label fw-semibold">Name</label><input type="text" name="name" required autofocus class="form-control"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Email</label><input type="email" name="email" required class="form-control"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Password</label><input type="password" name="password" required minlength="8" class="form-control"></div>
    <div class="mb-3"><label class="form-label fw-semibold">Password Confirm</label><input type="password" name="password_confirmation" required minlength="8" class="form-control"></div>
    <button type="submit" class="btn btn-primary-tw w-100" style="padding:.6rem">Register</button>
  </form>
  <hr class="my-4">
  <p class="text-center" style="font-size:.85rem"><span class="text-gray-500">Sudah punya akun? </span><a href="/auth/login" class="text-primary-tw text-decoration-none fw-semibold">Masuk</a></p>
</div>
{{template "auth/foot" .}}{{end}}
